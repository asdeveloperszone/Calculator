name: Build Calculator APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: SimpleCalculator

    steps:
      # Step 1: Checkout the code
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Setup Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # Step 3: Give execute permission to gradlew
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Step 4: Build the Debug APK
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      # Step 5: Upload APK as artifact
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: SimpleCalculator-Debug-APK
          path: SimpleCalculator/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
